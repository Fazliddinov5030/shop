{% extends 'base.html' %}
{% block content %}
<div class="text-center mb-4">
    <div class="auth-icon-wrapper mx-auto mb-3">
        <i class="bi bi-box-arrow-in-right"></i>
    </div>
    <h1 class="text-center">{{ t.login_title }}</h1>
    <p class="text-muted">{{ t.login_subtitle }}</p>
</div>
<div class="row">
    <div class="col-12 col-md-8 col-lg-5 mx-auto">
        <div class="card form-card form-card-centered p-3">
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary w-100 py-2">{{ t.login_button }}</button>
            </form>
        </div>
    </div>
</div>

<p class="mt-3 text-center">{{ t.login_no_account }} <a href="{% url 'register' %}">{{ t.login_register_link }}</a>.</p>
{% endblock %}
